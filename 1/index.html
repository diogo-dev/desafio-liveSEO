<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Importando os arquivos de estilização e de javascript -->
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
  <title>Desafio 1</title>
</head>
<body class="body-container">

  <div class="main-container">
    <h1 class="form-title">Formulário</h1>
    <form 
      action="submit"
      class="form-container"
    >
      <input 
        type="text"
        placeholder="Nome"
        class="name-input"
        required
      />

      <input 
        type="text" 
        placeholder="E-mail"
        class="email-input"
        required
      />

      <div class="password-container">
        <input 
          type="password" 
          placeholder="Senha"
          class="password-input"
          required
        />
        <span class="toggle-eye" id="toggleEye">
          <svg class="eye-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </span>
      </div>

      <button class="btn-submit" type="submit">
        Enviar
      </button>
    
    </form>
  
  </div>
  
</body>
</html>
